name: Publish main to GitHub Pages

# Pages serves from the gh-pages branch (enabled automatically when that
# branch was created). This keeps gh-pages identical to main, so pushing
# to main is all it takes to update the live site.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git push --force origin HEAD:gh-pages
